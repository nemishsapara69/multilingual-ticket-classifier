services:
  - type: web
    name: multilingual-ticket-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: MODEL_DIR
        value: models/best
      - key: SKIP_MODEL_LOAD
        value: "0"
      - key: ENABLE_RULE_FALLBACK
        value: "1"
      - key: TICKET_DB_PATH
        value: /tmp/tickets.db
