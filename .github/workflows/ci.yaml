name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t mtc-api:ci .

      - name: Build Webapp image
        run: docker build -f docker/webapp.Dockerfile -t mtc-webapp:ci .

      - name: Build Train image
        run: docker build -f docker/train.Dockerfile -t mtc-train:ci .
